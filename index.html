<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlineQuiz | Gold Edition</title>
    <style>
        :root {
            --p: #b08d3e; --p-h: #8e6f2e; --txt: #1e293b; --mut: #64748b; 
            --err: #ef4444; --succ: #22c55e; --bord: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: #1e293b; /* Fallback color */
            
            /* If your Canva image is a PNG, change .jpg to .png below */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('background.png'); 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed;
            font-family: 'Inter', system-ui, sans-serif; 
        }

        .container { 
            position: relative; 
            z-index: 10;
            background: #ffffff; 
            width: 95%; 
            max-width: 480px; 
            padding: 40px 30px; 
            border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-height: 90vh; 
            overflow-y: auto;
            border: 1px solid var(--bord);
        }

        .hide { display: none !important; }
        h1, h2, h3 { text-align: center; color: var(--p); margin-bottom: 20px; font-family: serif; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid var(--bord); border-radius: 14px; font-size: 15px; outline: none; }
        button { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; color: white; background: var(--p); transition: 0.2s; }
        button:hover { background: var(--p-h); transform: translateY(-1px); }

        .btn-sec { background: #f1f5f9; color: var(--txt); }
        .btn-dan { background: var(--err); }
        .btn-suc { background: var(--succ); }

        .q-card { background: #fdfcf8; padding: 15px; border-radius: 18px; margin-top: 15px; border: 1px solid #eaddca; }
        .history-item { background: white; border: 1px solid var(--bord); padding: 15px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .badge { font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: 800; }
        .timer { font-size: 32px; font-weight: 900; color: var(--err); text-align: center; margin-bottom: 20px; font-family: monospace; }
        .opt-btn { background: #fff; border: 1.5px solid var(--bord); color: var(--txt); text-align: left; }
        .opt-btn:hover { border-color: var(--p); background: #fdfcf8; }
        
        .container::-webkit-scrollbar { width: 6px; }
        .container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="scr-login">
        <h1>OnlineQuiz</h1>
        <input type="text" id="login-u" placeholder="Username">
        <input type="password" id="login-p" placeholder="Password">
        <button id="btn-login">Sign In</button>
        <button id="to-signup" class="btn-sec">Create Account</button>
    </div>

    <div id="scr-signup" class="hide">
        <h1>Register</h1>
        <input type="text" id="reg-u" placeholder="Username">
        <input type="password" id="reg-p" placeholder="Password">
        <button id="btn-register" class="btn-suc">Create Account</button>
        <button id="back-login" class="btn-sec">Back</button>
    </div>

    <div id="scr-menu" class="hide">
        <h2 id="hi-user">Welcome</h2>
        <div class="q-card">
            <input type="text" id="room-code" placeholder="Enter Room Number">
            <button id="btn-join" class="btn-suc">Join & Start Quiz</button>
        </div>
        <h4 style="margin:20px 0 5px 0">History</h4>
        <div id="history-list"></div>
        <button onclick="location.reload()" class="btn-sec" style="margin-top:20px;">Logout</button>
    </div>

    <div id="scr-quiz" class="hide">
        <div id="q-timer" class="timer">00:00</div>
        <h3 id="q-text">Loading...</h3>
        <div id="q-options"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmgXIu6snhLCYQz8b_aSGVQc99zg17MjE",
        authDomain: "onlinequiz-197c0.firebaseapp.com",
        projectId: "onlinequiz-197c0",
        storageBucket: "onlinequiz-197c0.appspot.com",
        messagingSenderId: "287222056808",
        appId: "1:287222056808:web:39ee1f2582eb55485938dd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let activeU = "", quizPool = [], qIdx = 0, score = 0, clock;

    const nav = (id) => {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hide'));
        document.getElementById(id).classList.remove('hide');
    };

    // --- LOGIN ---
    document.getElementById('to-signup').onclick = () => nav('scr-signup');
    document.getElementById('back-login').onclick = () => nav('scr-login');

    document.getElementById('btn-login').onclick = async () => {
        const u = document.getElementById('login-u').value.trim().toLowerCase();
        const p = document.getElementById('login-p').value;
        const snap = await getDoc(doc(db, "users", u));
        if(snap.exists() && snap.data().pass === p){
            activeU = u;
            document.getElementById('hi-user').innerText = "Hello, " + u;
            loadHistory(u);
            nav('scr-menu');
        } else alert("Invalid Login");
    };

    // --- QUIZ ---
    document.getElementById('btn-join').onclick = async () => {
        const c = document.getElementById('room-code').value;
        const snap = await getDoc(doc(db, "quizzes", c));
        if(!snap.exists() || !snap.data().active) return alert("Quiz Room Inactive");
        quizPool = snap.data().questions; qIdx = 0; score = 0;
        nav('scr-quiz'); startClock(snap.data().timeLimit * 60); renderQuiz();
    };

    function startClock(s) {
        let t = s;
        clock = setInterval(() => {
            let m = Math.floor(t/60), sec = t%60;
            document.getElementById('q-timer').innerText = `${m}:${sec<10?'0':''}${sec}`;
            if(t <= 0){ clearInterval(clock); endQuiz(); }
            t--;
        }, 1000);
    }

    function renderQuiz() {
        if(qIdx >= quizPool.length) return endQuiz();
        const it = quizPool[qIdx];
        document.getElementById('q-text').innerText = it.q;
        const box = document.getElementById('q-options'); box.innerHTML = "";
        it.opts.forEach(o => {
            const b = document.createElement('button'); b.className = "opt-btn"; b.innerText = o.text;
            b.onclick = () => { if(o.cor) score++; qIdx++; renderQuiz(); };
            box.appendChild(b);
        });
    }

    async function endQuiz() {
        clearInterval(clock);
        const p = Math.round((score/quizPool.length)*100);
        const d = new Date();
        await setDoc(doc(db, "results", activeU+"_"+Date.now()), { user: activeU, pct: p, date: d.toLocaleDateString() });
        alert("Finished! Jump to history.");
        await loadHistory(activeU);
        nav('scr-menu');
    }

    async function loadHistory(u) {
        const box = document.getElementById('history-list'); box.innerHTML = "";
        const snap = await getDocs(collection(db, "results"));
        snap.forEach(d => {
            const r = d.data();
            if(r.user === u) {
                const item = document.createElement('div'); item.className = "history-item";
                item.innerHTML = `<div><b>${r.pct}%</b> <small>${r.date}</small></div>
                ${r.pct >= 80 ? `<button onclick="window.genCert('${r.user}','${r.pct}','${r.date}')" style="width:auto; padding:5px 10px; font-size:11px;">Certificate</button>` : ''}`;
                box.appendChild(item);
            }
        });
    }

    // --- CERTIFICATE ---
    window.genCert = (name, score, date) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 2000; canvas.height = 1414;
        const bg = new Image();
        // IMPORTANT: Rename your certificate file to exactly 'certificate.png'
        bg.src = 'certificate.png'; 
        bg.onload = () => {
            ctx.drawImage(bg, 0, 0, 2000, 1414);
            ctx.textAlign = 'center'; ctx.fillStyle = '#b08d3e';
            ctx.font = 'bold 90px serif'; ctx.fillText(name.toUpperCase(), 1000, 720); 
            ctx.font = 'italic 40px sans-serif'; ctx.fillText(`Final Score: ${score}%`, 1000, 820);
            const link = document.createElement('a'); link.download = 'MyCert.png';
            link.href = canvas.toDataURL(); link.click();
        };
    };
</script>
</body>
</html>
