<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <!-- 1. LOGIN -->
    <div id="login-container" class="container">
        <h1>Portal Login</h1>
        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn">Login</button>
            <p id="error-msg" class="error hide">Invalid Credentials!</p>
        </div>
    </div>

    <!-- 2. STUDENT MENU -->
    <div id="menu-container" class="container hide">
        <h2 id="menu-welcome"></h2>
        <div class="input-group">
            <button id="start-quiz-btn">Start New Quiz</button>
            <button id="view-scores-btn" class="secondary">My Score History</button>
            <button onclick="location.reload()" class="small-btn">Logout</button>
        </div>
    </div>

    <!-- 3. TEACHER PANEL -->
    <div id="teacher-panel" class="container hide">
        <div class="header"><h3>Teacher Dashboard</h3><button onclick="location.reload()" class="small-btn">Logout</button></div>
        <div class="input-group">
            <h4>Add New Question</h4>
            <input type="text" id="new-question" placeholder="Question Text">
            <div class="ans-row"><input type="text" id="ans-1" placeholder="Choice 1"><input type="checkbox" id="check-1"> Correct?</div>
            <div class="ans-row"><input type="text" id="ans-2" placeholder="Choice 2"><input type="checkbox" id="check-2"> Correct?</div>
            <button id="add-question-btn" style="background:#28a745;">Add to Quiz</button>
        </div>
        <ul id="teacher-question-list"></ul>
    </div>

    <!-- 4. ADMIN PANEL -->
    <div id="admin-panel" class="container hide">
        <div class="header"><h3>Admin Dashboard</h3><button onclick="location.reload()" class="small-btn">Logout</button></div>
        <ul id="admin-score-list"></ul>
        <button id="delete-all-btn" class="danger-btn">Wipe All Data</button>
    </div>

    <!-- 5. QUIZ / HISTORY -->
    <div id="quiz-container" class="container hide">
        <div class="header"><button id="back-to-menu" class="small-btn">← Back</button><span id="user-display"></span></div>
        <h2 id="question-header"></h2>
        <div id="answer-buttons" class="btn-grid"></div>
        <button id="next-btn" class="hide">Next Question</button>
        <button id="finish-btn" class="hide">Finish & Save</button>
        <div id="history-section" class="history-section hide">
            <ul id="user-score-list"></ul>
            <div id="cert-preview-area"></div>
            <div id="cert-download-area"></div>
        </div>
    </div>

    <!-- 6. CERTIFICATE TEMPLATE -->
    <div id="certificate-template" style="display: none;">
        <div id="cert-capture" style="width: 900px; height: 636px; background-image: url('https://ibb.co'); background-size: cover; position: relative; margin: auto; font-family: Arial, sans-serif; background-color: white;">
            <h2 id="cert-name" style="position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%); font-size: 42px; color: #333; width: 100%; text-align: center; font-weight: bold;"></h2>
            <h3 id="cert-score" style="position: absolute; top: 62%; left: 50%; transform: translate(-50%, -50%); font-size: 22px; color: #555;"></h3>
            <p style="position: absolute; bottom: 85px; right: 100px; font-size: 16px;">Date: <span id="cert-date"></span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
