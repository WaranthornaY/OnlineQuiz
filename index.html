<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Pro - Secure</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <div id="login-container">
            <h1>Login</h1>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn">Login</button>
            <p style="text-align:center">
                New? <button id="btn-to-signup" style="background:none; color:#1a73e8; width:auto; text-decoration:underline; display:inline;">Create Account</button>
            </p>
        </div>

        <div id="signup-container" class="hide">
            <h1>New Account</h1>
            <input type="text" id="new-username" placeholder="Choose Username">
            <input type="password" id="new-password" placeholder="Choose Password">
            <button id="signup-submit-btn" style="background:#2ecc71;">Register Now</button>
            <button id="back-to-login" class="secondary-btn">Back</button>
        </div>

        <div id="menu-container" class="hide">
            <h2 id="menu-welcome"></h2>
            <button id="start-quiz-btn" style="background:#2ecc71;">Start Quiz</button>
            <button onclick="location.reload()" class="secondary-btn">Logout</button>
        </div>

        <div id="admin-panel" class="hide">
            <h3>Admin Dashboard</h3>
            <div id="admin-score-list"></div>
            <button id="export-btn" style="background:#27ae60;">Export Excel</button>
            <button onclick="location.reload()" class="secondary-btn">Logout</button>
        </div>

        <div id="teacher-panel" class="hide">
            <h3>Teacher Control</h3>
            <input type="text" id="room-code-input" placeholder="Room Code">
            <button id="save-room-btn">Create/Save Room</button>
            <button onclick="location.reload()" class="secondary-btn">Logout</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
