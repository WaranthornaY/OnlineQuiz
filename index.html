<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Pro - Secure Admin</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <div id="login-container">
            <h1>Secure Quiz Login</h1>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn">Login</button>
        </div>

        <div id="admin-panel" class="hide">
            <h3>System Administrator</h3>
            <div id="admin-score-list"></div>
            <button id="export-btn" style="background:#27ae60; margin-top:15px;">📊 Export Scores</button>
            <button onclick="location.reload()" class="secondary-btn">Logout</button>
        </div>

        <div id="teacher-panel" class="hide">
            <h3>Teacher Control</h3>
            <input type="text" id="room-code-input" placeholder="Room Code">
            <div id="t-q-list"></div>
            <button onclick="location.reload()" class="secondary-btn">Logout</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
